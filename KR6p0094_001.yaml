body:
  text: 虞山普仁院淨業比丘行䇿定事例擇清淨廣廈以為七堂中奉彌陀聖像懸諸華幡然燈燒香七日不絶但以香光莊嚴如法供養不用蔬果讚吹等堂中左右各設長桌一張亦用香爐供具嚴飾之桌外各設坐椅四張中央向佛設長桌一張與左右桌齊兩橫離一二尺許可通出入桌上供疏文一道大爐一座華燭供具須令相稱桌外放蒲墩四箇左右近壁若無禪牀則多設坐位以便隨班退坐其同行淨侶定十二人分為三班每班四人首位司引磬記持佛號以千聲為度次位司小魚後二位司巡察見班中昏散者警之中央面佛為第一班近西一人為班首即是七主右邊東向為第二班近上一人為班首左邊西向為第三班近下一人為班首佛前上下兩長桌上各置引磬小魚一副用過隨放桌上凡七堂施設須於隔宿事事周備同七緇素亦須隔日齊集沐浴已預請主七師分班定位教示演習每班繞佛百聲即歸位換班於旋繞中間驀鳴大魚六下以代食梆三班如法出堂乃至齋堂旋念止魚接板結板接佛歸堂旋坐一一指教明白令衆委悉以期中戒語不便指授故須預習也習已各自至誠禮佛求佛加被令七晝夜中所作成辦不起內外魔障事畢早息毋致疲勞第一日五更報鐘鳴衆起盥潄畢用湯點入堂主七師鳴引磬禮佛三拜各依位立定舉香讚誦阿彌陀經聲須和緩往生呪三遍起讚佛偈即稱佛名中班鳴引磬二下問訊旋繞左右班乃端坐默隨若昏散重者當微動脣齒庶免坐忘間斷并落昏沈無記性中其神氣清明者當閉目靜聽一心緣佛使心中佛號朗朗如貫珠不雜不斷首班旋繞畢仍於下邊立空於陀字上鳴引磬一下次班即從座起從容出位於佛桌邊一行立定首班復鳴引磬一下又四五聲佛後於陀佛二字上連鳴兩下即止佛問訊就右邊空位坐次班接佛問訊旋繞如前佛號畢仍於上邊立定三鳴引磬末班起座出位於下邊接佛旋繞一如前式次班復就左邊空位而坐默隨佛號如是三班周而復始從旦至暮佛聲不絶每稱念一千默隨二千旋行一千安坐二千庶幾身口弗疲勞逸均等凡旋繞畢時但看無小魚桌邊方乃就立則上下永無差誤矣十二人外不論緇素多寡亦分三班行則隨行坐則退坐齋堂鋪設圓位三面長桌相接唯下方中央少空通行堂出入四面近壁皆可回繞設位本方而日圓者取周匝回旋之義也三時粥飯外午前加食一餐蔬菜止二簋兩人共之每食行食畢鳴梆六下表南無阿彌陀佛堂中聞梆聲不論何班旋繞如常旋念至疏桌邊班首置數珠於桌上取引磬鳴二下問訊若佛聲太急即于此時改魚緩念左右班起立同聲稱念班首帶引磬從中路向佛旋行仍從中路出堂若首班在前餘兩班次第隨行須待本班緇素行盡次班方可接行若值中班在前則末班隨行首班居後若末班在前則首班隨行次班居後不得越亂到齋堂右旋一匝候末位到齊班首即鳴引磬一下止魚停佛緇素隨所到處就位坐定不得推前遜後不得抽身離位隨坐隨食不用問訊念誦出生等旁懸板椎一副預令沙彌立板椎邊候小魚停止接板念佛每聲鳴板二下衆等食時一心緣佛不可須臾放逸食訖班首於南字上鳴引磬一下沙彌即於陀佛二字上連擊二下結板衆齊出位亦不問訊即起佛右繞歸堂一依前次班首行至本立處鳴引磬二下問訊置於桌上仍取數珠繞佛餘班歸原位坐其左班西向者須順旋至桌邊從末位進毋直歸毋逆行凡歸位出班及有事出入並須安詳徐步毋得踉蹌疾走入夜日光初暝供疏桌上亦然長燭此後約每班兩回旋念六千佛竟更俟下班接佛旋行時七主出位鳴引磬一下堂衆皆起同聲旋念不復論三班緇素次序但約旋念十數匝後七主於下方中央面佛立定三鳴引磬結小魚一陳止佛衆皆面佛鳴引磬同念發願偈云弟子衆等至心發願願命終時神不亂正念直往生安養面奉彌陀值衆聖修行十地勝常樂於末後三字緩鳴引磬三下即禮佛三拜歸單就寢衆等爾時尤宜防護三業正念寢息不得作餘事説餘語起餘雜想亦不得禮餘佛誦餘經呪縱有恆課終身不缺者亦皆停止寧于七日後追補之不然則未免間斷夾雜又烏得稱為七日持名一心不亂乎寢息後兩炷官香將盡香燈師預通厨房辦面水湯點即鳴報鐘此後六日入堂禮佛已即起讚佛偈不誦經呪餘皆如初日行持期中請定護七師二人為一期外護凡緇素隨喜毋令入堂唯專為念佛來者乃導之使入禮佛三拜已即送隨班旋念或送左右班後不得揖衆共語若未滿期欲去亦但禮佛而出不用別衆緇素於七前預到發願終七者必須終竟一期不同隨喜之例倘年高有疾力難支遣可密啓護七師乞其寫帖轉達七主或旋行時少坐或入夜後早息當破格方便之次立監直師一人衆中有違約者即登名記罰不可放過次安香燈一人行者二人香燈司爐火香燭之事遇燭暗則翦香盡則換衆赴齋則守堂不出衆就寢則看香定夜須老成者充之若疲乏時憗與監直師更換寢息不可失事誤衆行者司茶水洗沐等事午前行茶兩次午後不拘次數入夜復行一次每行畢隨收器蕩滌俟旋念班坐定還須補行凡盆水浣濯衆所需待者皆當盡心供辦護七師須隨時經理毋令懈廢滿七之日入夜六千佛竟更俟下班接佛後主七師如常鳴引磬三班同起旋念五百聲佛主七師於佛桌東首向佛立定鳴大磬一下衆皆面佛鳴第三下時隨接鐘鼓一通鳴大魚跪稱觀音勢至清淨海衆各十聲如晚課例小淨土文回向禮佛十二拜菩薩三拜三自歸畢隨鳴大磬一下衆相向側立主七師至下方中央展具禮佛長跪衆稱南無大乘常住三寶護七師宣疏畢仍鳴小魚誦往生呪送疏不拘遍數結呪已念發願偈問訊回至佛前衆同展具作禮三拜收具問訊鳴引磬引衆出堂詣主七師室中禮謝主七師同衆至護七師處及諸職事師處巡寮敘謝訖然後歸堂圓禮為一期事竟罰例罰有三等上罰錢百文中罰五十文下罰十文不論錢之貴賤準此為式堂中懸水牌一面置筆硯一副有應罰者監直師隨書牌上書已持示本人令知俟期滿結算某某罰錢若干仍令本人買香供佛或放生命若無錢者罰持往生呪每呪十遍準錢一文期中第一禁止語話不論堂內堂外未起佛前已止佛後但有犯者一上罰三犯者出堂若有不得已事必欲語可密告護七師一兩語即止若多語高聲語罰同凡欲抽解著衣等竟自起身事畢速還託事在外延緩者一下罰若私入寮舍坐臥片時者上罰有事欲出堂須甲來乙去甲若未還乙須少待或時事迫促亦得兩人並出若四人中兩人已出第三人復出者一下罰隨班後坐者不拘旋繞未竟不得越班而出須待歸位坐定方可抽身若越班出者緇素同一中罰上班繞佛將畢下班不得離位若非時出堂以致臨班不到者一中罰隨班緇素當旋繞時非年高有疾稟白在前輒自坐立者一下罰若安坐時性不耐坐混入他班旋念者一中罰數數出入者一下罰除有疾出班歸位及出堂入堂並須威儀庠序踉蹌急遽者一下罰堂中行動左旋梗衆者一下罰衝班出入者一下罰香燈師不在堂遇燭暗香盡左右班中首末四位或後坐衆俱得暫起代行唯旋行緇素不得翦燭添香佇立妨後違者一下罰三班緇素中有不善隨魚者臨班須默念或低聲念若高聲亂衆者一下罰護七師當引至僻處密啓令知入夜止佛後須隨衆安寢若更禮佛持誦作餘功行者一中罰香燈師應勸止若不聽方白監直師記罰食時赴齋堂隨行兩班前後失次者二班首各一中罰齋堂食畢起身抽解者一下罰定夜失時致入堂後三班旋念未滿一回即天明者香燈師一下罰入堂輒曉者一上罰或昏睡失香失之太早致衆疲乏者一中罰監直師隨時隨處當為衆勤察依式登記若屢犯不知或雖知不記罰同本人之例凡同七護七諸師於未起七前並須熟規式次將罰例録出粘客堂前有後到緇素先令細覽條約方送入堂或不解文義當與摘要説知若造次引送以致入堂昧昧動輒犯約者護七師一下罰此三等罰其計二十三條今開明記罰式如左犯不語禁一上罰多語一上罰高聲語一上罰私入寮舍坐臥一上罰定夜失時一上罰越班出堂一中罰非時出堂一中罰亂班旋念一中罰入夜別作功行一中罰隨班失次一中罰定夜失時一中罰託事久出一下罰接踵出堂一下罰臨班坐立一下罰數數出入一下罰行動急遽一下罰左旋梗衆一下罰衝班出入一下罰佇立妨後一下罰高聲亂衆一下罰食畢先起一下罰造次送人入堂一下罰定夜失時一下罰如上條例事在必行蓋欲制止放逸助成勝行非好為煩刻也行者當念一生悠忽止此七日精進各須激切奮勇不惜軀命無論行住坐臥飲食便利一句洪名當如呼吸不斷不可斯須停止俄頃夾雜既欲一心不亂大非尋常念佛可比也思之勉之疏文封面寫念佛七期回向發願疏秉教修淨主七沙門某甲具緘伏以一心圓淨即五濁而不違清泰之鄉三界橫超雖九品而豈隔庸凡之位融勝三昧王於性海轉第一義諦於口輪道在人宏佛隨機應大清國某省某府縣某寺苾芻某甲等即日熏沐投誠稽首歸命娑婆教主本師釋迦牟尼文佛極樂世界接引導師阿彌陀佛觀音勢至一切聖賢同賜慈悲俯垂證鑒切念弟子某甲與現前衆生等生逢劫濁報屬凡軀三業六根既無罪而不造五趣八難亦無苦而不嘗暗識相傳曾未覺悟死生浩漫解脫何期所幸宿植微因得生正信早入彌陀願海專修淨土法門祈寶域以棲神託華輪而送想用是依經立軌準教崇修謹于今月某日為始啓建一心精進念佛道場七永日於中嚴飾堂儀肅分班次執持聖號終食無違存想洪名須臾不離以斯功德回向往生惟願阿彌陀佛慈悲攝受與諸聖衆親垂接引必令諸根寂靜正念昭彰須摩境現于目前金色華敷于捨報如經所説願悉不虗又願以此七日精進功德普令衆等斷七支惡滅七遮罪除七慢障離七穢行遊七寶池布七淨華具七辨才智演七菩提分超七方便位證七常住果又願以此三班淨侶十二僧伽和合修持所生功德普令衆等絶三惡道轉三重障淨三聚戒歷三乘位越三界而長騖冠三輩以高躋深入三解脫門圓發三如來藏又願衆等得成佛已坐道樹下三七思惟為諸衆生説三乘法三轉四諦十二行法輪廣説三世十二支因緣流轉還滅逆順法門究竟同趣薩婆若海又願於此七日之中若緇若素若遠若近若久若暫若來若去乃至執勞運力隨喜見聞咸出苦輪俱生樂國共睹須彌毫相同瞻法界藏身又願衆等既得往生安養親近彌陀乃至一切如來悉得承事一切佛土悉往莊嚴一切善友悉能隨順一切法門悉得通達一切衆生悉蒙度脫一切行願悉獲圓成虗空有盡我願無窮仰願三寶證知令我等得如所願滿菩提願普仁七日念佛記附録金善丁巳春大士聖誕虞山之北普仁禪院依彌陀經教起七日念佛新規爰集淨衆不揀僧俗其主則普仁大師號截流道人者其道場外護則身葉師古衲師也其同行緇侶則越海在間慧如湛月慈宏海目德容越祗尚法再應可尊也其遙聞法曾溯水來虞則婁東兩僧鳴谷定慧也其居士則汪旅三翁鳳蕤顧公臣金水若陳千頃趙存湖翁子餘翁康成沈誕先夏子彝也念佛為往生捷徑觀音乃西方導師故取諸二月十九也其法則選僧十二分三班每班四人各有所司十二人外不論緇素多寡亦分三班隨其後一班旋繞則兩班安坐食時赴齋堂依次無敢紊坐定佛聲初歇小沙彌擊板念佛以繼之使一句洪名不絶于心口耳間夜分略睡聞鐘聲鳴齊起凡左行者罰越位者罰相語者倍罰蓋嚴若軍令焉是日也汪旋三等數人先在豫後至聞堂中佛聲琅琅護壇師導之而入但禮佛不許揖衆輒隨班行已而退坐或默隨佛號微動脣齒或閉目靜聽而以心隨餘人後至者亦如之念佛之聲時而和緩悠揚如一氣呼吸綿綿不斷至其聲之振疾則又如猛將追敵不盡滅不止使雜妄無間可乘衆魔無路可入當其風雨晦冥衆音振響不復知山頭霧起殿宇雲封及天朗氣清則松風謖謖澗水潺潺無不與念佛之聲相應和至若雞聲唱徹燈火熒熒曦旭方升香煙繚繞曉焉而念佛也山光乍暝林谷幽翳衆籟寂然梵音獨舉暮焉而念佛也或則神意怡悅一塵不染四字孤存此真能一心不亂者其或矍然奮發神若馳而心欲止此期于一心不亂而未能者更有信願已堅勝緣欣遇塵事敦逼魔障多端暫爾依班尋復離位咨嗟悔恨不獲終斯七日者我大師度生方便慈誨真切衆等信西方之可至幸日夕以追隨知洪號之難思因稱揚而感涕嗟乎石火電光人生百年猶七日耳以七日而供塵纍塵纍何時了以七日而要淨土淨土必可期況百年之內其為七日也甚多而剎那異世其為百年也又絶少人知百年之莫期而不知此七日之難遘又惟知百年之虗度而不知彼七日之浪擲悲夫常熟普仁寺截流大師回首後有孫狀元扶桑先生之長君翰臣為冥司勾攝死去一晝夜醒而言曰我拘繫閻羅殿下黑暗中忽睹光明燭天香華布空閻君伏地迎西歸大師審之即截公也我以師光明所照及遂得放還同日有南關外吳氏子病死踰夕復活其言所見亦如孫子言常熟翁叔元寶林氏記時康熙三十六年正月望日
